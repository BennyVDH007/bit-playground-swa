<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BIT DK Playground</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #264653;
      color: white;
      margin: 0;
      padding: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      color: #dcdcdc;
    }

    .apps {
      margin-top: 40px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      color: #264653;
      padding: 20px;
      border-radius: 12px;
      width: 250px;
      text-decoration: none;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  <h1>BIT DK Playground</h1>
  <p>Samling af interne HTML apps og eksperimenter.</p>

  <div class="apps">

    <a class="card" href="#">
      <h2>Finance til SharePoint</h2>
      <p>Migrationsprojekt</p>
    </a>

  </div>

</body>
</html>
