<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Vagtsystem Playground</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1f2937;
      color: white;
      margin: 0;
      padding: 40px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      color: #d1d5db;
      font-size: 18px;
    }

    .card {
      margin-top: 30px;
      background: white;
      color: #1f2937;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
    }

    .status {
      display: inline-block;
      margin-top: 15px;
      background: #10b981;
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Vagtsystem Playground</h1>

  <p>
    Test- og udviklingsmiljø til HTML-baseret vagtsystem.
  </p>

  <div class="card">
    <h2>Status</h2>

    <p>
      Denne version kører via Azure Static Web Apps.
    </p>

    <div class="status">
      Online
    </div>
  </div>

</body>
</html>
